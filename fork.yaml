title: "XDC Fork Diff" # Define the HTML page title
footer: | # define the footer with markdown
  XDC fork Diff
base:
  name: ethereum/go-ethereum
  url: https://github.com/ethereum/go-ethereum
  ref: refs/heads/master
fork:
  name: xdc
  url: https://github.com/XinFinOrg/XDPoSChain 
  ref: refs/heads/dev-upgrade
